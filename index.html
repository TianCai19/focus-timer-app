<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            transition: background 0.5s ease;
        }
        body.focused {
            background: linear-gradient(135deg, #0d4f3c 0%, #1a3a2e 50%, #0a2f1f 100%);
        }
        body.not-focused {
            background: linear-gradient(135deg, #4a0d0d 0%, #2d0a0a 50%, #1a0505 100%);
            animation: pulse-bg 1.5s ease-in-out infinite;
        }
        body.idle {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        @keyframes pulse-bg {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        .warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .warning-overlay.active {
            opacity: 1;
            animation: flash-border 1s ease-in-out infinite;
        }
        @keyframes flash-border {
            0%, 100% { box-shadow: inset 0 0 100px 20px rgba(255, 0, 0, 0.3); }
            50% { box-shadow: inset 0 0 150px 40px rgba(255, 0, 0, 0.5); }
        }
        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 10;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            transition: color 0.5s, text-shadow 0.5s;
        }
        h1.focused { color: #4caf50; text-shadow: 0 0 30px rgba(76, 175, 80, 0.5); }
        h1.not-focused { color: #ff4444; text-shadow: 0 0 30px rgba(255, 68, 68, 0.8); }
        h1.idle { color: #e94560; }
        .timer-display {
            font-size: 6rem;
            font-weight: bold;
            margin: 30px 0;
            font-family: 'Courier New', monospace;
            transition: color 0.5s, text-shadow 0.5s, transform 0.3s;
        }
        .timer-display.focused {
            color: #4caf50;
            text-shadow: 0 0 40px rgba(76, 175, 80, 0.6);
        }
        .timer-display.not-focused {
            color: #ff4444;
            text-shadow: 0 0 50px rgba(255, 68, 68, 0.8);
            animation: shake 0.5s ease-in-out infinite;
        }
        .timer-display.idle {
            color: #fff;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .status {
            font-size: 1.5rem;
            padding: 15px 35px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 30px;
            transition: all 0.5s ease;
            font-weight: bold;
        }
        .status.active {
            background: rgba(76, 175, 80, 0.3);
            border: 3px solid #4caf50;
            color: #4caf50;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
        }
        .status.paused {
            background: rgba(255, 68, 68, 0.3);
            border: 3px solid #ff4444;
            color: #ff4444;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
            animation: pulse-status 1s ease-in-out infinite;
        }
        .status.idle-status {
            background: rgba(255, 152, 0, 0.3);
            border: 3px solid #ff9800;
            color: #ff9800;
        }
        @keyframes pulse-status {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .video-container {
            position: relative;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            transition: box-shadow 0.5s, border 0.5s;
            border: 4px solid transparent;
        }
        .video-container.focused {
            border-color: #4caf50;
            box-shadow: 0 0 50px rgba(76, 175, 80, 0.5);
        }
        .video-container.not-focused {
            border-color: #ff4444;
            box-shadow: 0 0 60px rgba(255, 68, 68, 0.6);
            animation: pulse-border 1s ease-in-out infinite;
        }
        .video-container.idle {
            border-color: #555;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 60px rgba(255, 68, 68, 0.6); }
            50% { box-shadow: 0 0 100px rgba(255, 68, 68, 0.9); }
        }
        #video {
            width: 480px;
            height: 360px;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
            transition: filter 0.3s;
        }
        #video.blurred {
            filter: blur(20px);
        }
        #canvas { display: none; }
        .warning-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .warning-text.show {
            opacity: 1;
            animation: blink 0.8s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .controls { margin-top: 30px; }
        button {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        #startBtn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.6);
        }
        #resetBtn {
            background: transparent;
            color: white;
            border: 2px solid #e94560;
        }
        #resetBtn:hover {
            background: #e94560;
        }
        .stats {
            margin-top: 25px;
            font-size: 1rem;
            color: #aaa;
        }
        /* 打榜功能样式 */
        .leaderboard-section {
            margin-top: 40px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .leaderboard-title {
            font-size: 1.5rem;
            color: #e94560;
        }
        .save-record-btn {
            padding: 10px 25px;
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .save-record-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        .save-record-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .leaderboard-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .leaderboard-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .rank {
            font-size: 1.5rem;
            font-weight: bold;
            width: 50px;
            text-align: center;
        }
        .rank.gold { color: #ffd700; }
        .rank.silver { color: #c0c0c0; }
        .rank.bronze { color: #cd7f32; }
        .record-info {
            flex: 1;
            text-align: left;
            margin-left: 15px;
        }
        .record-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
        }
        .record-date {
            font-size: 0.85rem;
            color: #888;
        }
        .record-time {
            font-size: 1.3rem;
            font-weight: bold;
            color: #4caf50;
            font-family: 'Courier New', monospace;
        }
        .delete-btn {
            background: transparent;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px 10px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .delete-btn:hover {
            opacity: 1;
        }
        .empty-list {
            color: #666;
            padding: 30px;
            text-align: center;
        }
        .name-input-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .name-input-modal.show {
            display: flex;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #e94560;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            color: #e94560;
        }
        .modal-content input {
            padding: 12px 20px;
            font-size: 1.1rem;
            border: 2px solid #555;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            width: 250px;
            margin-bottom: 20px;
        }
        .modal-content input:focus {
            outline: none;
            border-color: #e94560;
        }
        .modal-buttons button {
            padding: 12px 30px;
            margin: 0 10px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .confirm-btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
        }
        .cancel-btn {
            background: transparent;
            border: 2px solid #666 !important;
            color: #fff;
        }
        /* 手机检测开关样式 */
        .phone-detection-toggle {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: 0.3s;
            border-radius: 26px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        .toggle-switch input:checked + .toggle-slider {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
        }
        .toggle-switch input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
        .toggle-label {
            font-size: 1rem;
            color: #ccc;
        }
        .phone-status {
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .phone-status.loading {
            background: rgba(255, 152, 0, 0.3);
            color: #ff9800;
        }
        .phone-status.ready {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }
        .phone-status.detected {
            background: rgba(255, 68, 68, 0.3);
            color: #ff4444;
            animation: pulse-status 0.5s ease-in-out infinite;
        }
        /* 音频选择器样式 */
        .audio-selector {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .select-audio-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #9c27b0, #ba68c8);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .select-audio-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(156, 39, 176, 0.4);
        }
        .audio-name {
            font-size: 0.9rem;
            color: #888;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .audio-name.active {
            color: #ba68c8;
        }
    </style>
</head>
<body class="idle">
    <div class="warning-overlay" id="warningOverlay"></div>
    <div class="container">
        <h1 class="idle" id="title">🎯 专注计时器</h1>
        <div class="status idle-status" id="status">等待开始</div>
        <div class="timer-display idle" id="timer">00:00:00</div>
        <div class="video-container idle" id="videoContainer">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="warning-text" id="warningText">⚠️ 请回到屏幕前</div>
        </div>
        <div class="controls">
            <button id="startBtn">开始专注</button>
            <button id="resetBtn">重置</button>
            <button id="blurBtn">🙈 模糊视频</button>
        </div>
        <div class="phone-detection-toggle">
            <label class="toggle-switch">
                <input type="checkbox" id="phoneDetectionToggle">
                <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">📱 手机检测模式</span>
            <span class="phone-status" id="phoneStatus"></span>
        </div>
        <div class="audio-selector">
            <button class="select-audio-btn" id="selectAudioBtn">🎵 选择提醒音乐</button>
            <span class="audio-name" id="audioName">未选择</span>
            <input type="file" id="audioFileInput" accept="audio/*" style="display: none;">
        </div>
        <div class="stats">
            <p>专注时长会在检测到人脸时累计，离开时自动暂停</p>
        </div>
        
        <!-- 打榜功能 -->
        <div class="leaderboard-section">
            <div class="leaderboard-header">
                <span class="leaderboard-title">🏆 专注排行榜</span>
                <button class="save-record-btn" id="saveRecordBtn">📝 记录本次成绩</button>
            </div>
            <ul class="leaderboard-list" id="leaderboardList">
                <li class="empty-list">暂无记录，开始专注并保存你的成绩吧！</li>
            </ul>
        </div>
    </div>
    
    <!-- 输入名字弹窗 -->
    <div class="name-input-modal" id="nameModal">
        <div class="modal-content">
            <h3>🎉 保存专注记录</h3>
            <input type="text" id="nameInput" placeholder="输入你的名字" maxlength="20">
            <div class="modal-buttons">
                <button class="confirm-btn" id="confirmSaveBtn">保存</button>
                <button class="cancel-btn" id="cancelSaveBtn">取消</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="app.js"></script>
</body>
</html>
